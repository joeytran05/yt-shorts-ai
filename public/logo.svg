<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Icon: vertical phone/shorts frame with play + autopilot dot -->
  <rect x="12" y="8" width="52" height="72" rx="10" fill="#e85555"/>
  <!-- Inner screen -->
  <rect x="18" y="16" width="40" height="56" rx="6" fill="#08080f"/>
  <!-- Play triangle -->
  <polygon points="30,30 30,58 54,44" fill="#e85555"/>
  <!-- Autopilot ring at bottom of icon -->
  <circle cx="38" cy="92" r="6" fill="none" stroke="#e85555" stroke-width="2"/>
  <circle cx="38" cy="92" r="2" fill="#e85555"/>
  <line x1="26" y1="92" x2="31" y2="92" stroke="#e85555" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="92" x2="50" y2="92" stroke="#e85555" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="82"
    y="58"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="38"
    letter-spacing="-1"
    fill="#dde0f0"
  >SHORT</text>
  <text
    x="82"
    y="96"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="400"
    font-size="38"
    letter-spacing="-1"
    fill="#e85555"
  >PILOT</text>

  <!-- Tagline -->
  <text
    x="296"
    y="96"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="11"
    fill="#5a5f7a"
    letter-spacing="1"
  >AUTOMATED SHORTS</text>
</svg>
