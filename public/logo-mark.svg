<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Phone/shorts frame -->
  <rect x="10" y="4" width="44" height="60" rx="9" fill="#e85555"/>
  <!-- Inner screen -->
  <rect x="16" y="11" width="32" height="46" rx="5" fill="#08080f"/>
  <!-- Play triangle -->
  <polygon points="24,22 24,46 46,34" fill="#e85555"/>
  <!-- Autopilot indicator ring -->
  <circle cx="32" cy="71" r="6" fill="none" stroke="#e85555" stroke-width="2"/>
  <circle cx="32" cy="71" r="2.5" fill="#e85555"/>
  <line x1="18" y1="71" x2="24" y2="71" stroke="#e85555" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="71" x2="46" y2="71" stroke="#e85555" stroke-width="2" stroke-linecap="round"/>
  <!-- Small AI spark top-right of frame -->
  <circle cx="60" cy="14" r="5" fill="#e85555" opacity="0.25"/>
  <circle cx="60" cy="14" r="2.5" fill="#e85555"/>
</svg>
